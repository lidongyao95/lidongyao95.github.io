<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Scan-line correspondence in simple stereo</title>
  <desc id="desc">Matching windows are searched along the same horizontal scan line in the right image.</desc>
  <rect width="1120" height="620" rx="26" fill="#07111f"/>
  <text x="64" y="72" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Search along one scan line</text>
  <text x="64" y="112" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="22">For this simplified setup, corresponding points share the same vertical coordinate.</text>

  <g transform="translate(90 160)">
    <rect x="0" y="0" width="420" height="330" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
    <text x="22" y="-18" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700">Left image</text>
    <line x1="22" y1="174" x2="398" y2="174" stroke="#f97316" stroke-width="4" stroke-dasharray="9 8"/>
    <rect x="242" y="136" width="74" height="74" rx="8" fill="#0ea5e9" fill-opacity="0.22" stroke="#7dd3fc" stroke-width="4"/>
    <circle cx="279" cy="174" r="8" fill="#fb923c"/>
    <text x="240" y="236" fill="#fed7aa" font-family="Inter, Arial, sans-serif" font-size="23">window W</text>
    <g fill="#1e293b">
      <rect x="44" y="50" width="54" height="38" rx="5"/>
      <rect x="138" y="74" width="74" height="46" rx="5"/>
      <rect x="310" y="58" width="58" height="38" rx="5"/>
      <rect x="70" y="246" width="78" height="42" rx="5"/>
      <rect x="246" y="258" width="106" height="44" rx="5"/>
    </g>
  </g>

  <g transform="translate(610 160)">
    <rect x="0" y="0" width="420" height="330" rx="18" fill="#0f172a" stroke="#a78bfa" stroke-width="3"/>
    <text x="22" y="-18" fill="#ddd6fe" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700">Right image</text>
    <line x1="22" y1="174" x2="398" y2="174" stroke="#f97316" stroke-width="4" stroke-dasharray="9 8"/>
    <rect x="160" y="136" width="74" height="74" rx="8" fill="#8b5cf6" fill-opacity="0.2" stroke="#c4b5fd" stroke-width="4"/>
    <circle cx="197" cy="174" r="8" fill="#fb923c"/>
    <text x="128" y="236" fill="#fed7aa" font-family="Inter, Arial, sans-serif" font-size="23">best match</text>
    <g fill="#1e293b">
      <rect x="36" y="50" width="54" height="38" rx="5"/>
      <rect x="128" y="74" width="74" height="46" rx="5"/>
      <rect x="298" y="58" width="58" height="38" rx="5"/>
      <rect x="62" y="246" width="78" height="42" rx="5"/>
      <rect x="236" y="258" width="106" height="44" rx="5"/>
    </g>
  </g>

  <line x1="370" y1="535" x2="807" y2="535" stroke="#f97316" stroke-width="4"/>
  <path d="M807 535L786 523V547Z" fill="#f97316"/>
  <text x="462" y="576" fill="#fdba74" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="800">disparity d = u1 - u2</text>
</svg>
