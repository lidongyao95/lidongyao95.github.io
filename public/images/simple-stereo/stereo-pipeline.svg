<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-labelledby="title desc">
  <title id="title">Simple stereo pipeline</title>
  <desc id="desc">A pipeline from rectified stereo images to matching, disparity map, and depth map.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1120" height="420" rx="26" fill="#09111f"/>
  <text x="64" y="72" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">From two images to a depth map</text>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(76 135)">
      <rect width="190" height="170" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
      <rect x="34" y="36" width="54" height="76" rx="8" fill="#155e75"/>
      <rect x="102" y="54" width="54" height="76" rx="8" fill="#312e81"/>
      <text x="34" y="140" fill="#e2e8f0" font-size="23" font-weight="700">stereo pair</text>
    </g>
    <line x1="282" y1="220" x2="372" y2="220" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(388 135)">
      <rect width="190" height="170" rx="18" fill="#111827" stroke="#f97316" stroke-width="3"/>
      <line x1="28" y1="68" x2="162" y2="68" stroke="#fdba74" stroke-width="4" stroke-dasharray="8 7"/>
      <line x1="28" y1="102" x2="162" y2="102" stroke="#fdba74" stroke-width="4" stroke-dasharray="8 7"/>
      <text x="28" y="140" fill="#e2e8f0" font-size="23" font-weight="700">scan-line match</text>
    </g>
    <line x1="594" y1="220" x2="684" y2="220" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(700 135)">
      <rect width="190" height="170" rx="18" fill="#0f172a" stroke="#22d3ee" stroke-width="3"/>
      <rect x="34" y="34" width="122" height="82" rx="8" fill="#0e7490"/>
      <rect x="48" y="46" width="94" height="12" rx="4" fill="#bae6fd"/>
      <rect x="48" y="72" width="72" height="12" rx="4" fill="#67e8f9"/>
      <rect x="48" y="98" width="106" height="12" rx="4" fill="#164e63"/>
      <text x="32" y="140" fill="#e2e8f0" font-size="23" font-weight="700">disparity map</text>
    </g>
    <line x1="906" y1="220" x2="996" y2="220" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(962 135)">
      <rect width="110" height="170" rx="18" fill="#111827" stroke="#a78bfa" stroke-width="3"/>
      <path d="M24 118 C34 64 58 44 90 34 L90 136 C60 132 38 130 24 118Z" fill="#8b5cf6" fill-opacity="0.42"/>
      <text x="18" y="150" fill="#e2e8f0" font-size="23" font-weight="700">depth</text>
    </g>
  </g>
</svg>
